<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.7, maximum-scale=0.7, user-scalable=no">
<title>BTC事件合约</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif;}
html,body{width:100%;background:#fff;color:#222;overflow-x:hidden;font-size:9px;}
.page-main{display:block;}
.page-history{display:none;padding:10px;}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #eee;}
.header-title{font-size:24px;font-weight:bold;}
.icon-history{font-size:20px;padding:4px;cursor:pointer;}
.top-coin{display:flex;align-items:center;flex-wrap:wrap;padding:12px 14px;gap:24px;}
.coin-name{font-size:26px;font-weight:bold;}
.rate-up{font-size:20px;color:#00b368;font-weight:bold;line-height:1.2;}
.rate-down{font-size:20px;color:#f53855;font-weight:bold;line-height:1.2;}
/* 内置模拟K线容器，无需外部脚本 */
.kline-wrap{width:100%;height:320px;background:#fafafa;position:relative;overflow:hidden;border-bottom:1px solid #eee;}
.kline-desc{position:absolute;top:10px;left:10px;color:#666;font-size:12px;}
.kline-price{position:absolute;top:10px;right:14px;font-size:14px;font-weight:bold;}
.kline-period{display:flex;padding:8px 14px;gap:10px;overflow-x:auto;}
.kline-period span{padding:6px 12px;border-radius:6px;background:#f0f0f0;font-size:13px;white-space:nowrap;cursor:pointer;}
.kline-period span.active{background:#222;color:#fff;}
.indicator-row{display:flex;padding:8px 14px;gap:12px;overflow-x:auto;border-bottom:1px solid #eee;margin-bottom:10px;}
.indicator-row span{font-size:14px;color:#666;white-space:nowrap;cursor:pointer;}
